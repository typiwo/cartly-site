<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <style>
    :root {
      --bg: #F5F0E1;
      --fg: #1B3A26;
      --muted: #5a6a5e;
      --accent: #1B3A26;
      --rule: #E5DCC3;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 17px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }
    header.site {
      border-bottom: 1px solid var(--rule);
      margin-bottom: 40px;
      padding-bottom: 20px;
    }
    header.site a.brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 40px;
      line-height: 1.2;
      margin: 0 0 8px;
    }
    h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      line-height: 1.3;
      margin: 40px 0 12px;
    }
    h3 {
      font-size: 18px;
      margin: 28px 0 8px;
    }
    p, ul, ol {
      margin: 0 0 16px;
    }
    ul, ol {
      padding-left: 24px;
    }
    li {
      margin-bottom: 8px;
    }
    a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    a:hover {
      text-decoration: none;
    }
    strong {
      font-weight: 600;
    }
    blockquote {
      margin: 20px 0;
      padding: 12px 20px;
      border-left: 3px solid var(--accent);
      background: rgba(27, 58, 38, 0.04);
      color: var(--fg);
    }
    blockquote p:last-child {
      margin-bottom: 0;
    }
    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 40px 0;
    }
    code {
      background: rgba(27, 58, 38, 0.08);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 15px;
    }
    footer.site {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      color: var(--muted);
      font-size: 14px;
    }
    footer.site a {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site">
      <a href="/" class="brand">Cartly</a>
    </header>
    <main>
      {{ content }}
    </main>
    <footer class="site">
      <p>
        <a href="/">Home</a> · <a href="/privacy/">Privacy</a> · <a href="/terms/">Terms</a> · <a href="mailto:privacy@cartly.app">privacy@cartly.app</a>
      </p>
      <p>&copy; 2026 Tyler Piwowarski, operating Cartly.</p>
    </footer>
  </div>
</body>
</html>
